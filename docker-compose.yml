# docker-compose.yml
#
# Two-service stack — reviewers can run the whole thing with:
#
#     docker compose up --build
#
# and hit http://localhost:8080 in the browser. The frontend nginx
# reverse-proxies /api, /actuator, /v3/api-docs, and /swagger-ui to the
# backend over the private `etalente` network, so the browser only ever
# talks to one origin (no CORS dance). The backend is also published on
# :8081 for direct curl/swagger access during development.
#
# Auth defaults to dev mode so no Firebase credentials are required.
# Drop a `.env` next to this file to override:
#
#     APP_AUTH_MODE=firebase
#     FIREBASE_PROJECT_ID=...
#     FIREBASE_CREDENTIALS_JSON={"type":"service_account",...}
#     ASSISTANT_PROVIDER=gemini
#     ASSISTANT_API_KEY=...

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: etalente-backend:local
    container_name: etalente-backend
    restart: unless-stopped
    environment:
      APP_AUTH_MODE: ${APP_AUTH_MODE:-dev}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:*,http://127.0.0.1:*}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CREDENTIALS_JSON: ${FIREBASE_CREDENTIALS_JSON:-}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH:-}
      ASSISTANT_PROVIDER: ${ASSISTANT_PROVIDER:-canned}
      ASSISTANT_API_KEY: ${ASSISTANT_API_KEY:-}
      # Spring profiles can be layered if someone adds them later.
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
    # Expose the backend on a non-conflicting host port so you can curl
    # it directly; the SPA in the browser never hits this port — it
    # reaches the API through the nginx proxy on :8080.
    ports:
      - "${BACKEND_PORT:-8081}:8080"
    networks:
      - etalente
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty = SPA uses relative URLs → nginx proxy handles routing.
        # Override to ship the bundle against a remote API instead.
        API_BASE_URL: ${API_BASE_URL:-}
    image: etalente-frontend:local
    container_name: etalente-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - etalente
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  etalente:
    driver: bridge
