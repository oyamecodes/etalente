# Nginx config for the Flutter web bundle.
#
# - Serves /index.html for any unmatched SPA path so go_router's
#   deep-links (e.g. /jobs/job-5) reload cleanly.
# - Reverse-proxies the backend-owned prefixes to the `backend` service
#   declared in docker-compose.yml. The SPA calls relative URLs
#   (API_BASE_URL=""), so the browser only ever sees one origin and CORS
#   is a non-issue.
# - Long-cache fingerprinted assets, short-cache the HTML/service-worker
#   so new deploys take effect immediately.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Backend proxy ----------------------------------------------------
    # `backend` is the compose service name; docker's embedded DNS resolves
    # it to the container IP.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /actuator/ {
        proxy_pass http://backend:8080;
    }

    location /v3/api-docs {
        proxy_pass http://backend:8080;
    }

    location /swagger-ui {
        proxy_pass http://backend:8080;
    }

    location /swagger-ui.html {
        proxy_pass http://backend:8080;
    }

    # ---- Static assets ----------------------------------------------------
    # Hashed bundles (main.dart.js, canvaskit/*, fonts, icons) can be
    # cached indefinitely.
    location ~* \.(?:js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|ico|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Never cache the shell / service worker — we want fresh deploys to
    # replace the bundle URLs on the next load.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
        try_files $uri =404;
    }
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
        try_files $uri =404;
    }

    # SPA fallback — any non-asset, non-api path returns the shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
